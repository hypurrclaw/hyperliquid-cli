name: Bug report
description: Report a reproducible bug
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include private keys, passphrases, keystores, account databases, `.qa/` artifacts, or unredacted wallet metadata. Use SECURITY.md for vulnerabilities.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `hyperliquid --version`
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS and CPU architecture
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Command and flags, with secrets redacted
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include JSON error output when available
      render: text
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
