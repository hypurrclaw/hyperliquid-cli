name: Feature request
description: Suggest an improvement or new command
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or pain point should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should the CLI do?
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Command risk
      options:
        - Read-only
        - Dry-run/preview only
        - Live mutating
        - Local secret/state management
        - Unsure
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Desired output or schema
      description: Include expected JSON fields if this is agent-facing.
